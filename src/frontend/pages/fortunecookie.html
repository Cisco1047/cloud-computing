<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fortune Cookie</title>
    <style>
    body {
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: #3f4e82; /* Matches the Spline background color */
    color: #ffffff;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden; /* Prevents unwanted scrolling */
    }

    header {
    text-align: center;
    padding: 20px;
    z-index: 10; /* Keeps text above the 3D scene if they overlap */
    background: rgba(0, 0, 0, 0.2); /* Subtle overlay for readability */
    }

    h1 {
    margin: 0;
    font-size: 2.5rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    }

    p {
    margin: 5px 0;
    opacity: 0.9;
    }

    #fortuneMessage {
    min-height: 1.5em; /* Keeps layout stable when message appears */
    color: #ffd700; /* Gold color for the fortune text */
    font-weight: bold;
    }

    main {
    flex-grow: 1;
    position: relative;
    width: 100%;
    height: 100%;
    }

    spline-viewer {
    width: 100%;
    height: 100%;
    }
    </style>
</head>
<body>
  <header>
    <h1>Fortune Cookie</h1>
    <p>Click the cookie to reveal your fortune!</p>
    <p id="fortuneMessage" style="margin-top: 20px; font-size: 18px; font-style: italic;"></p>

  </header>
    <main>
        <script type="module" src="https://unpkg.com/@splinetool/viewer@1.12.79/build/spline-viewer.js"></script>
        <spline-viewer url="https://prod.spline.design/Iy5nIXsqf2w5qRBx/scene.splinecode"></spline-viewer>
    </main>
</body>
</html>
